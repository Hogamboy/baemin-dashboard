<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>배달현황 대시보드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}

    /* ── 테마 변수 ── */
    :root {
      --bg:      #f0fafa;
      --bg2:     #ffffff;
      --bg3:     #e8f8f5;
      --border:  #00c3aa33;
      --border2: #00c3aa88;
      --text1:   #0a2a28;
      --text2:   #5a8a84;
      --accent:  #00c3aa;
      --acl:     #00c3aa18;
      --green:   #00796b;
      --red:     #d05050;
      --yellow:  #c09010;
      --header-border: #00c3aa33;
    }
    body.dark {
      --bg:      #0f1117;
      --bg2:     #1a1d27;
      --bg3:     #13161f;
      --border:  #ffffff15;
      --border2: #00c3ff55;
      --text1:   #f0f0f0;
      --text2:   #666;
      --accent:  #00c3ff;
      --acl:     #00c3ff18;
      --green:   #00e676;
      --red:     #ff5252;
      --yellow:  #ffd740;
      --header-border: #00c3ff22;
    }

    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;padding-bottom:40px;transition:background 0.4s,color 0.4s}

    header{background:var(--bg2);border-bottom:2px solid var(--header-border);padding:14px 20px;position:sticky;top:0;z-index:10;transition:background 0.4s,border-color 0.4s}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:34px;height:34px;background:var(--acl);border:1.5px solid var(--accent);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;transition:all 0.4s}
    .logo-text{font-size:15px;font-weight:700;color:var(--text1);transition:color 0.4s}
    .center-sub{font-size:10px;color:var(--text2);margin-top:1px;transition:color 0.4s}
    .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .next-info{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:5px 10px;white-space:nowrap;transition:all 0.4s}
    .next-info span{color:var(--green);font-weight:700}
    .theme-btn{background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;color:var(--accent);font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s;flex-shrink:0}
    .theme-btn:hover{background:var(--acl)}

    .control-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:space-between}
    .copy-btn{background:var(--acl);border:1.5px solid var(--accent);border-radius:7px;color:var(--green);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:14px 12px;cursor:pointer;font-weight:700;white-space:nowrap;transition:all 0.3s}
    .copy-btn:hover{background:var(--accent);color:#fff}
    .divider{width:1px;height:20px;background:var(--border)}
    .sets-wrap{display:flex;align-items:center;gap:5px}
    .sets-label{font-size:11px;color:var(--text2)}
    .sets-input{width:38px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;color:var(--text1);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:4px 6px;text-align:center;transition:all 0.4s}
    .arr-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--accent);font-size:11px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.3s}
    .arr-btn:hover{background:var(--acl)}
    .day-btns{display:flex;gap:5px}
    .day-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;padding:4px 12px;cursor:pointer;transition:all 0.2s}
    .day-btn.active{background:var(--acl);border-color:var(--border2);color:var(--green)}

    /* ── 배너 ── */
    .active-banner{margin:14px 16px 6px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.3s}
    .active-banner:hover{border-color:var(--border2)}
    .active-main{display:flex;align-items:center;gap:10px}
    .active-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
    .active-label{font-size:12px;color:var(--text2)}
    .active-count{font-size:26px;font-weight:900;color:var(--green);line-height:1}
    .active-names{font-size:10px;color:var(--text2);max-width:55%;line-height:1.7;text-align:right}
    .active-name-tag{display:inline-block;background:var(--acl);color:var(--green);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin:1px 2px;font-size:10px}

    /* ── 요약 카드 ── */
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 16px}
    .summary-card{background:var(--bg2);border-radius:12px;padding:14px 10px;text-align:center;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:all 0.4s}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
    .summary-card.complete::before{background:var(--green)}
    .summary-card.reject::before{background:var(--red)}
    .summary-card.cancel::before{background:var(--yellow)}
    .card-label{font-size:11px;color:var(--text2);margin-bottom:8px}
    .card-value{font-size:26px;font-weight:900;line-height:1}
    .summary-card.complete .card-value{color:var(--green)}
    .summary-card.reject .card-value{color:var(--red)}
    .summary-card.cancel .card-value{color:var(--yellow)}
    .card-unit{font-size:12px;font-weight:500}

    .bar-wrap{display:flex;gap:4px;padding:2px 16px 8px;height:12px}
    .bar-segment{height:8px;border-radius:4px;min-width:2px}
    .bar-complete{background:var(--green)}.bar-reject{background:var(--red)}.bar-cancel{background:var(--yellow)}
    .bar-legend{display:flex;gap:14px;padding:0 16px 12px;font-size:11px;color:var(--text2)}
    .legend-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

    /* ── 피크 ── */
    .section-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:4px 16px 8px}
    .peak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 14px}
    .peak-card{background:var(--bg3);border-radius:12px;padding:14px 8px 10px;text-align:center;border:1px solid var(--border);position:relative;overflow:hidden;transition:all 0.4s}
    .peak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
    .peak-emoji{font-size:18px;margin-bottom:5px}
    .peak-label{font-size:9px;color:var(--text2);margin-bottom:5px}
    .peak-value{font-size:22px;font-weight:900;color:var(--accent);line-height:1}
    .peak-goal{font-size:12px;color:var(--text2);font-weight:400;margin-left:1px}
    .peak-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin:8px 4px 0;overflow:hidden}
    .peak-bar{height:100%;border-radius:3px;transition:width 0.6s ease}
    .peak-pct{font-size:9px;color:var(--text2);margin-top:4px}

    /* ── 라이더 섹션 (접기/펼치기) ── */
    .rider-section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px;cursor:pointer;user-select:none}
    .rider-section-header:hover .rider-section-title{color:var(--accent)}
    .rider-section-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;transition:color 0.2s}
    .rider-toggle-icon{font-size:12px;color:var(--text2);transition:transform 0.3s}
    .rider-toggle-icon.open{transform:rotate(180deg)}
    .rider-list{padding:0 16px;overflow:hidden;transition:max-height 0.4s ease;max-height:0}
    .rider-list.open{max-height:2000px}
    .rider-card{background:var(--bg2);border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:all 0.4s}
    .rider-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:3px}
    .rider-status{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;display:inline-block}
    .status-active{background:var(--acl);color:var(--green);border:1px solid var(--border2)}
    .status-inactive{background:#ff525222;color:var(--red)}
    .rider-stats{display:flex;gap:14px;text-align:center}
    .stat-item{min-width:34px}
    .stat-val{font-size:17px;font-weight:900;line-height:1}
    .stat-label{font-size:9px;color:var(--text2);margin-top:2px}
    .stat-complete{color:var(--green)}.stat-reject{color:var(--red)}.stat-cancel{color:var(--yellow)}.stat-zero{color:#555}

    .timestamp{font-size:11px;color:var(--text2);text-align:center;padding:14px;transition:color 0.4s}
    .loading{text-align:center;padding:60px 20px;color:var(--text2)}
    .spinner{font-size:32px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{text-align:center;padding:50px 20px;color:var(--red);font-size:13px;line-height:1.8}

    /* 로그인 화면 */
    .login-box{max-width:360px;margin:60px auto;padding:0 20px}
    .login-box input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;color:var(--text1);font-size:16px;padding:14px 16px;outline:none;margin-bottom:12px;font-family:'Noto Sans KR',sans-serif;transition:all 0.4s}
    .login-box button{width:100%;background:linear-gradient(135deg,var(--accent),#0099aa);border:none;border-radius:10px;color:#fff;font-size:15px;font-weight:700;padding:15px;cursor:pointer;font-family:'Noto Sans KR',sans-serif}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <div>
        <div class="logo-text" id="centerTitle">배달현황 대시보드</div>
        <div class="center-sub" id="centerSub">배민커넥트비즈</div>
      </div>
    </div>
    <div class="header-right">
      <div class="next-info">다음 갱신 <span id="nextTime">--:--</span></div>
      <div class="theme-btn" id="themeBtn" onclick="toggleTheme()">🌙</div>
    </div>
  </div>
  <div class="control-bar">
    <div class="flex:1"></div>
    <button class="copy-btn" id="copyBtn" onclick="copyStatus()">📋 현황 복사</button>
        <div class="sets-wrap">
      <span class="sets-label">세트수</span>
      <div class="arr-btn" onclick="changeSets(-1)">▼</div>
      <input type="number" class="sets-input" id="setsInput" value="5" min="1" max="10" />
      <div class="arr-btn" onclick="changeSets(1)">▲</div>
      <span class="sets-label">세트</span>
    </div>
    <div class="divider"></div>
    <div class="day-btns">
      <button class="day-btn" data-day="weekday">평일</button>
      <button class="day-btn" data-day="friday">금</button>
      <button class="day-btn" data-day="saturday">토</button>
      <button class="day-btn" data-day="sunday">일</button>
    </div>
  </div>
</header>

<div id="content">
  <div class="loading"><div class="spinner">⏳</div><br>데이터 불러오는 중...</div>
</div>
<div class="timestamp" id="ts"></div>

<script>
const FIREBASE_BASE = "https://baemin-dashboard-b289e-default-rtdb.firebaseio.com";
const BAEMIN_CENTERS = {
  mango_panda:   "🥭 망고 팬더",
  lime_penguin:  "🍋 라임 펭귄",
  cherry_rabbit: "🍒 체리 래빗",
};

let currentCenterId = null;
let currentDayType  = getTodayDayType();
let currentSets     = 5;
let lastData        = null;
let riderListOpen   = false;
let manualTheme     = null;

// ── 테마 ──
function applyTheme(dark) {
  document.body.classList.toggle("dark", dark);
  document.getElementById("themeBtn").textContent = dark ? "☀️" : "🌙";
}

function autoTheme() {
  if (manualTheme !== null) { applyTheme(manualTheme); return; }
  const now  = new Date();
  const mins = now.getHours() * 60 + now.getMinutes();
  applyTheme(mins < 7*60+30 || mins >= 19*60+30);
}

function toggleTheme() {
  const isDark = document.body.classList.contains("dark");
  manualTheme = !isDark;
  applyTheme(manualTheme);
}

autoTheme();
setInterval(autoTheme, 60000);

// ── Firebase URL ──
function getCenterFromUrl() {
  return new URLSearchParams(window.location.search).get("center") || null;
}
function getFirebaseUrl() {
  if (!currentCenterId) return null;
  return `${FIREBASE_BASE}/baeminData/${currentCenterId}.json`;
}

// ── 목표 ──
const GOALS_PER_SET = {
  weekday: { morningPeak:21, afternoonOff:20, eveningPeak:30, nightOff:29 },
  friday:  { morningPeak:24, afternoonOff:21, eveningPeak:32, nightOff:33 },
  saturday:{ morningPeak:31, afternoonOff:22, eveningPeak:36, nightOff:31 },
  sunday:  { morningPeak:33, afternoonOff:22, eveningPeak:35, nightOff:30 },
};
function getTodayDayType() {
  const d = new Date().getDay();
  return d===0?"sunday":d===6?"saturday":d===5?"friday":"weekday";
}
function getGoals(dayType, sets) {
  const base = GOALS_PER_SET[dayType] || GOALS_PER_SET.weekday;
  return { morningPeak:base.morningPeak*sets, afternoonOff:base.afternoonOff*sets,
           eveningPeak:base.eveningPeak*sets, nightOff:base.nightOff*sets };
}

// ── 자동 갱신 ──
const SLOT_MIN = 5;
function getNextSlot() {
  const now = new Date();
  const ms  = now.getMinutes()*60000 + now.getSeconds()*1000 + now.getMilliseconds();
  const slotMs = SLOT_MIN * 60000;
  return new Date(Date.now() + (slotMs - (ms % slotMs)));
}
function updateNextTime() {
  const next = getNextSlot();
  document.getElementById("nextTime").textContent =
    next.toLocaleTimeString("ko-KR", { hour:"2-digit", minute:"2-digit" });
}
function scheduleNextLoad() {
  const msLeft = getNextSlot() - Date.now();
  setTimeout(() => { loadData(); scheduleNextLoad(); }, msLeft);
}

// ── 요일 버튼 ──
document.querySelectorAll(".day-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    currentDayType = btn.dataset.day;
    updateDayBtns();
    if (lastData) render(lastData);
  });
});
function updateDayBtns() {
  document.querySelectorAll(".day-btn").forEach(b => b.classList.toggle("active", b.dataset.day === currentDayType));
}
updateDayBtns();

// ── 세트수 ──
document.getElementById("setsInput").addEventListener("change", e => {
  currentSets = Math.max(1, parseInt(e.target.value) || 1);
  e.target.value = currentSets;
  if (lastData) render(lastData);
});
function changeSets(dir) {
  const input  = document.getElementById("setsInput");
  const newVal = Math.min(10, Math.max(1, (parseInt(input.value)||1) + dir));
  input.value  = newVal;
  currentSets  = newVal;
  if (lastData) render(lastData);
}

// ── 데이터 로드 ──
async function loadData() {
  if (!currentCenterId) return;
  const url = getFirebaseUrl();
  if (!url) return;
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error("응답 오류 " + res.status);
    const data = await res.json();
    if (!data || !data.riders) throw new Error("데이터 없음");
    lastData = data;
    render(data);
    document.getElementById("ts").textContent = "마지막 업데이트: " + (data.scrapedAt || "-");
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="error-msg">⚠️ 데이터를 불러오지 못했어요.<br><small style="color:var(--text2)">${e.message}</small><br><br>관리자가 배민 페이지를 열어두면 자동으로 업데이트됩니다.</div>`;
  }
}

// ── 피크바 ──
function peakBar(val, goal) {
  if (!goal) return "";
  const pct   = Math.min(100, (val/goal)*100);
  const color = pct >= 100 ? "var(--green)" : pct >= 70 ? "#f5c842" : "var(--red)";
  return `<div class="peak-bar-wrap"><div class="peak-bar" style="width:${pct.toFixed(0)}%;background:${color}"></div></div>
          <div class="peak-pct">${pct.toFixed(0)}%</div>`;
}

// ── 렌더 ──
function render(data) {
  const s      = data.summary || {};
  const goals  = getGoals(currentDayType, currentSets);
  const total  = (s.complete||0) + (s.reject||0) + (s.cancel||0);
  const pct    = v => total > 0 ? Math.max(1,(v/total)*100).toFixed(1) : 0;
  const rjPct  = total > 0 ? Math.max(1,((s.reject+s.cancel)/total)*100).toFixed(1) : 0;
  const active = data.activeCount ?? data.riders.filter(r=>r.statusCode==="DELIVERING"||r.status?.includes("운행중")).length;
  const totalR = data.totalCount ?? data.riders.length;
  const activeNames = data.riders.filter(r=>r.statusCode==="DELIVERING"||r.status?.includes("운행중")).map(r=>r.name);
  const dayLabel = {weekday:"평일",friday:"금요일",saturday:"토요일",sunday:"일요일"}[currentDayType];

  if (data.centerName) {
    document.getElementById("centerTitle").textContent = data.centerName;
    document.title = data.centerName;
  }

  const calcRR = r => {
    const t = (r.complete||0)+(r.reject||0)+(r.cancel||0);
    return t > 0 ? Math.round(((r.reject+r.cancel)/t)*1000)/10 : 0;
  };
  const rrColor = rate => rate >= 20 ? "var(--red)" : rate >= 10 ? "#f5c842" : "var(--green)";
  const sv = (v,cls,label) =>
    `<div class="stat-item"><div class="stat-val ${v===0?"stat-zero":cls}">${v}</div><div class="stat-label">${label}</div></div>`;
  const svRate = rate =>
    `<div class="stat-item"><div class="stat-val" style="color:${rrColor(rate)}">${rate}%</div><div class="stat-label">거절율</div></div>`;

  const nameTags = activeNames.map(n=>`<span class="active-name-tag">${n}</span>`).join("");

  const sorted = [...data.riders].sort((a,b) => {
    return (a.status?.includes("운행중")?0:1) - (b.status?.includes("운행중")?0:1);
  });
  const riderCards = sorted.map(r => {
    const isActive = r.statusCode==="DELIVERING" || r.status?.includes("운행중");
    const rr = calcRR(r);
    return `<div class="rider-card">
      <div>
        <div class="rider-name">${r.name}</div>
        <span class="rider-status ${isActive?"status-active":"status-inactive"}">${r.status||"-"}</span>
      </div>
      <div class="rider-stats">
        ${sv(r.complete,"stat-complete","완료")}
        ${sv(r.reject,"stat-reject","거절")}
        ${sv(r.cancel,"stat-cancel","배차취소")}
        ${svRate(rr)}
      </div>
    </div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="section-title">⏰ 시간대별 완료 · ${dayLabel} ${currentSets}세트 기준</div>
    <div class="peak-grid">
      <div class="peak-card">
        <div class="peak-emoji">🌅</div><div class="peak-label">아침점심피크</div>
        <div class="peak-value">${s.morningPeak||0}<span class="peak-goal">/ ${goals.morningPeak}</span></div>
        ${peakBar(s.morningPeak||0, goals.morningPeak)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">☀️</div><div class="peak-label">오후논피크</div>
        <div class="peak-value">${s.afternoonOff||0}<span class="peak-goal">/ ${goals.afternoonOff}</span></div>
        ${peakBar(s.afternoonOff||0, goals.afternoonOff)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">🌆</div><div class="peak-label">저녁피크</div>
        <div class="peak-value">${s.eveningPeak||0}<span class="peak-goal">/ ${goals.eveningPeak}</span></div>
        ${peakBar(s.eveningPeak||0, goals.eveningPeak)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">🌙</div><div class="peak-label">심야논피크</div>
        <div class="peak-value">${s.nightOff||0}<span class="peak-goal">/ ${goals.nightOff}</span></div>
        ${peakBar(s.nightOff||0, goals.nightOff)}
      </div>
    </div>

    <div class="active-banner" onclick="toggleRiderList()">
      <div class="active-main">
        <div class="active-dot"></div>
        <div>
          <div class="active-label">현재 운행중</div>
          <div class="active-count">${active}<span style="font-size:14px;color:var(--text2);font-weight:400"> / ${totalR}명</span></div>
        </div>
      </div>
      <div class="active-names">${nameTags||'<span style="color:var(--text2);font-size:11px">운행중 없음</span>'}</div>
    </div>

    <div class="summary-grid">
      <div class="summary-card complete"><div class="card-label">✅ 완료</div><div class="card-value">${s.complete||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card reject"><div class="card-label">❌ 거절</div><div class="card-value">${s.reject||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card cancel"><div class="card-label">⚡ 배차취소</div><div class="card-value">${s.cancel||0}<span class="card-unit">건</span></div></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-segment bar-complete" style="width:${pct(s.complete)}%"></div>
      <div class="bar-segment bar-reject"   style="width:${pct(s.reject)}%"></div>
      <div class="bar-segment bar-cancel"   style="width:${pct(s.cancel)}%"></div>
    </div>
    <div class="bar-legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>완료 ${pct(s.complete)}%</span>
      <span><span class="legend-dot" style="background:var(--red)"></span>거절율 ${rjPct}%</span>
    </div>

    <div class="rider-section-header" onclick="toggleRiderList()">
      <span class="rider-section-title">👥 라이더별 현황 (${totalR}명)</span>
      <span class="rider-toggle-icon" id="riderToggleIcon">▼</span>
    </div>
    <div class="rider-list" id="riderList">${riderCards}</div>`;

  // 기존 펼침 상태 유지
  if (riderListOpen) {
    document.getElementById("riderList")?.classList.add("open");
    document.getElementById("riderToggleIcon")?.classList.add("open");
  }
}

// ── 라이더 목록 토글 ──
function toggleRiderList() {
  const list = document.getElementById("riderList");
  const icon = document.getElementById("riderToggleIcon");
  if (!list) return;
  riderListOpen = !riderListOpen;
  list.classList.toggle("open", riderListOpen);
  icon?.classList.toggle("open", riderListOpen);
}

// ── 현황 복사 ──
function copyStatus() {
  if (!lastData) { alert("데이터가 없어요!"); return; }
  const s     = lastData.summary || {};
  const goals = getGoals(currentDayType, currentSets);
  const now   = new Date();
  const hour  = now.getHours();
  let peakLabel="", peakDone=0, peakGoal=0;
  if      (hour>=6  && hour<14) { peakLabel="아침점심";  peakDone=s.morningPeak||0;  peakGoal=goals.morningPeak; }
  else if (hour>=14 && hour<17) { peakLabel="오후논피크"; peakDone=s.afternoonOff||0; peakGoal=goals.afternoonOff; }
  else if (hour>=17 && hour<21) { peakLabel="저녁피크";  peakDone=s.eveningPeak||0;  peakGoal=goals.eveningPeak; }
  else                           { peakLabel="심야논피크"; peakDone=s.nightOff||0;     peakGoal=goals.nightOff; }
  const remain     = Math.max(0, peakGoal - peakDone);
  const active     = lastData.activeCount ?? 0;
  const centerName = (document.title || BAEMIN_CENTERS[currentCenterId] || currentCenterId)
                       .replace(/\s*\(DP\d+\)/i, "");
  const timeStr    = now.toLocaleTimeString("ko-KR", {hour:"2-digit",minute:"2-digit"});
  const pct = peakGoal > 0 ? ((peakDone / peakGoal) * 100).toFixed(0) : 0;
const text = `${timeStr} ${peakLabel}\n운행중 ${active}명\n진행 : ${peakDone}/${peakGoal} (${pct}%)\n잔여할당 : ${remain}건`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById("copyBtn");
    if (btn) { btn.textContent="✅ 복사됨!"; setTimeout(()=>btn.textContent="📋 현황 복사",2000); }
  });
}

// ── 센터 로그인 + 시작 ──
function initDashboard() {
  const urlCenter = getCenterFromUrl();
  if (urlCenter && BAEMIN_CENTERS[urlCenter]) {
    currentCenterId = urlCenter;
    startDashboard();
    return;
  }
  showLoginScreen();
}

function showLoginScreen() {
  document.getElementById("content").innerHTML = `
    <div class="login-box">
      <div style="text-align:center;margin-bottom:28px">
        <div style="font-size:40px;margin-bottom:12px">🛵</div>
        <div style="font-size:18px;font-weight:700;color:var(--text1)">배민 대시보드</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px">센터 코드를 입력해주세요</div>
      </div>
      <div style="background:var(--bg2);border-radius:16px;padding:24px;border:1px solid var(--border)">
        <input type="password" id="centerCodeInput" placeholder="센터 코드 입력"
          onkeydown="if(event.key==='Enter') doLoginDashboard()" />
        <button onclick="doLoginDashboard()">접속</button>
        <div id="loginErr" style="color:var(--red);font-size:12px;text-align:center;margin-top:10px;min-height:18px"></div>
      </div>
    </div>`;
  setTimeout(() => document.getElementById("centerCodeInput")?.focus(), 100);
}

function doLoginDashboard() {
  const input = document.getElementById("centerCodeInput")?.value?.trim().toLowerCase().replace(/ /g,"_");
  if (!input) return;
  if (BAEMIN_CENTERS[input]) {
    currentCenterId = input;
    history.replaceState(null,"",`?center=${input}`);
    startDashboard();
  } else {
    document.getElementById("loginErr").textContent = "센터 코드가 올바르지 않아요.";
  }
}

function startDashboard() {
  document.getElementById("centerTitle").textContent = BAEMIN_CENTERS[currentCenterId] || currentCenterId;
  loadData();
  scheduleNextLoad();
  setInterval(updateNextTime, 30000);
  updateNextTime();
}

initDashboard();
</script>
</body>
</html>
