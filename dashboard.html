<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>배달현황 대시보드</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:#0f1117;color:#f0f0f0;min-height:100vh;padding-bottom:40px}

    header{background:linear-gradient(135deg,#1a1d27,#0f1117);border-bottom:2px solid #00c3ff22;padding:14px 20px;position:sticky;top:0;z-index:10}
    .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
    .logo{display:flex;align-items:center;gap:10px}
    .logo-icon{width:34px;height:34px;background:linear-gradient(135deg,#00c3ff,#0077ff);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px}
    .logo-text{font-size:15px;font-weight:700}
    .center-sub{font-size:10px;color:#666;margin-top:1px}
    .header-right{display:flex;align-items:center;gap:8px}
    .refresh-btn{background:#1a1d27;border:1px solid #ffffff22;border-radius:8px;color:#aaa;font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:7px 12px;cursor:pointer;transition:all 0.2s}
    .refresh-btn:hover{border-color:#00c3ff44;color:#00c3ff}
    .next-info{font-size:11px;color:#444;background:#13161f;border-radius:6px;padding:5px 10px;white-space:nowrap}
    .next-info span{color:#00c3ff;font-weight:700}

    .control-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .sets-wrap{display:flex;align-items:center;gap:6px}
    .sets-label{font-size:11px;color:#666}
    .sets-input{width:44px;background:#1a1d27;border:1px solid #ffffff22;border-radius:6px;color:#fff;font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:4px 6px;text-align:center}
    .sets-unit{font-size:11px;color:#555}
    .divider{width:1px;height:20px;background:#ffffff11}
    .day-btns{display:flex;gap:5px}
    .day-btn{background:#1a1d27;border:1px solid #ffffff15;border-radius:6px;color:#666;font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;padding:4px 12px;cursor:pointer;transition:all 0.2s}
    .day-btn.active{background:#00c3ff22;border-color:#00c3ff88;color:#00c3ff}

    .active-banner{margin:14px 16px 6px;background:#1a1d27;border:1px solid #00e67630;border-radius:12px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between}
    .active-main{display:flex;align-items:center;gap:10px}
    .active-dot{width:9px;height:9px;background:#00e676;border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
    .active-label{font-size:12px;color:#888}
    .active-count{font-size:26px;font-weight:900;color:#00e676;line-height:1}
    .active-names{font-size:10px;color:#555;max-width:55%;line-height:1.7;text-align:right}
    .active-name-tag{display:inline-block;background:#00e67615;color:#00e676;border-radius:4px;padding:1px 6px;margin:1px 2px;font-size:10px}

    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 16px}
    .summary-card{background:#1a1d27;border-radius:12px;padding:14px 10px;text-align:center;border:1px solid #ffffff0d;position:relative;overflow:hidden}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .summary-card.complete::before{background:#00e676}
    .summary-card.reject::before{background:#ff5252}
    .summary-card.cancel::before{background:#ffd740}
    .card-label{font-size:11px;color:#888;margin-bottom:8px}
    .card-value{font-size:26px;font-weight:900;line-height:1}
    .summary-card.complete .card-value{color:#00e676}
    .summary-card.reject .card-value{color:#ff5252}
    .summary-card.cancel .card-value{color:#ffd740}
    .card-unit{font-size:12px;font-weight:500}

    .bar-wrap{display:flex;gap:4px;padding:2px 16px 8px;height:12px}
    .bar-segment{height:8px;border-radius:4px;min-width:2px}
    .bar-complete{background:#00e676}.bar-reject{background:#ff5252}.bar-cancel{background:#ffd740}
    .bar-legend{display:flex;gap:14px;padding:0 16px 12px;font-size:11px;color:#888}
    .legend-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

    .section-title{font-size:11px;color:#555;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:4px 16px 8px}
    .peak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 14px}
    .peak-card{background:#13161f;border-radius:12px;padding:14px 8px 10px;text-align:center;border:1px solid #ffffff08;position:relative;overflow:hidden}
    .peak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#00c3ff,#0077ff)}
    .peak-emoji{font-size:18px;margin-bottom:5px}
    .peak-label{font-size:9px;color:#666;margin-bottom:5px}
    .peak-value{font-size:22px;font-weight:900;color:#00c3ff;line-height:1}
    .peak-goal{font-size:12px;color:#3a3f55;font-weight:400;margin-left:1px}
    .peak-bar-wrap{height:5px;background:#1a1d27;border-radius:3px;margin:8px 4px 0;overflow:hidden}
    .peak-bar{height:100%;border-radius:3px;transition:width 0.6s ease}
    .peak-pct{font-size:9px;color:#555;margin-top:4px}

    .rider-list{padding:0 16px}
    .rider-card{background:#1a1d27;border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1px solid #ffffff08;display:flex;align-items:center;justify-content:space-between}
    .rider-name{font-size:14px;font-weight:700;color:#f0f0f0;margin-bottom:3px}
    .rider-status{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;display:inline-block}
    .status-active{background:#00e67622;color:#00e676}
    .status-inactive{background:#ff525222;color:#ff5252}
    .rider-stats{display:flex;gap:14px;text-align:center}
    .stat-item{min-width:34px}
    .stat-val{font-size:17px;font-weight:900;line-height:1}
    .stat-label{font-size:9px;color:#666;margin-top:2px}
    .stat-complete{color:#00e676}.stat-reject{color:#ff5252}.stat-cancel{color:#ffd740}.stat-zero{color:#333}

    .timestamp{font-size:11px;color:#444;text-align:center;padding:14px}
    .loading{text-align:center;padding:60px 20px;color:#555}
    .spinner{font-size:32px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{text-align:center;padding:50px 20px;color:#ff5252;font-size:13px;line-height:1.8}
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-icon">🛵</div>
      <div>
        <div class="logo-text" id="centerTitle">배달현황 대시보드</div>
        <div class="center-sub" id="centerSub">배민커넥트비즈</div>
      </div>
    </div>
    <div class="header-right">
      <div class="next-info">다음 갱신 <span id="nextTime">--:--</span></div>
      <button class="refresh-btn" onclick="loadData()">🔄 새로고침</button>
    </div>
  </div>
  <div class="control-bar">
    <div class="sets-wrap">
      <span class="sets-label">세트수</span>
      <input type="number" class="sets-input" id="setsInput" value="3" min="1" max="10" />
      <span class="sets-unit">세트</span>
    </div>
    <div class="divider"></div>
    <div class="day-btns">
      <button class="day-btn" data-day="weekday">평일</button>
      <button class="day-btn" data-day="friday">금</button>
      <button class="day-btn" data-day="saturday">토</button>
      <button class="day-btn" data-day="sunday">일</button>
    </div>
  </div>
</header>

<div id="content">
  <div class="loading"><div class="spinner">⏳</div><br>데이터 불러오는 중...</div>
</div>
<div class="timestamp" id="ts"></div>

<script>
const FIREBASE_URL = "https://baemin-dashboard-b289e-default-rtdb.firebaseio.com/baeminData.json";
const SLOT_MIN = 1;

const GOALS_PER_SET = {
  weekday: { morningPeak: 21, afternoonOff: 20, eveningPeak: 30, nightOff: 29 },
  friday:  { morningPeak: 24, afternoonOff: 21, eveningPeak: 32, nightOff: 33 },
  saturday:{ morningPeak: 31, afternoonOff: 22, eveningPeak: 36, nightOff: 31 },
  sunday:  { morningPeak: 33, afternoonOff: 22, eveningPeak: 35, nightOff: 30 },
};

function getTodayDayType() {
  const d = new Date().getDay();
  if (d === 0) return "sunday";
  if (d === 6) return "saturday";
  if (d === 5) return "friday";
  return "weekday";
}

function getGoals(dayType, sets) {
  const base = GOALS_PER_SET[dayType] || GOALS_PER_SET.weekday;
  return { morningPeak: base.morningPeak*sets, afternoonOff: base.afternoonOff*sets,
           eveningPeak: base.eveningPeak*sets, nightOff: base.nightOff*sets };
}

// 다음 5분 정각 계산
function getNextSlot() {
  const now = new Date();
  const ms = now.getMinutes() * 60000 + now.getSeconds() * 1000 + now.getMilliseconds();
  const slotMs = SLOT_MIN * 60000;
  return new Date(Date.now() + (slotMs - (ms % slotMs)));
}

function updateNextTime() {
  const next = getNextSlot();
  document.getElementById("nextTime").textContent =
    next.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
}

// 정각마다 자동 로드
function scheduleNextLoad() {
  const msLeft = getNextSlot() - Date.now();
  setTimeout(() => {
    loadData();
    scheduleNextLoad(); // 다음 슬롯 예약
  }, msLeft);
}

let currentDayType = getTodayDayType();
let currentSets    = 3;
let lastData       = null;

// 요일 버튼
const dayBtns = document.querySelectorAll(".day-btn");
dayBtns.forEach(btn => {
  btn.addEventListener("click", () => {
    currentDayType = btn.dataset.day;
    updateDayBtns();
    if (lastData) render(lastData);
  });
});
function updateDayBtns() {
  dayBtns.forEach(b => b.classList.toggle("active", b.dataset.day === currentDayType));
}
updateDayBtns();

// 세트수
document.getElementById("setsInput").addEventListener("change", (e) => {
  currentSets = Math.max(1, parseInt(e.target.value) || 1);
  e.target.value = currentSets;
  if (lastData) render(lastData);
});

async function loadData() {
  try {
    const res = await fetch(FIREBASE_URL);
    if (!res.ok) throw new Error("응답 오류 " + res.status);
    const data = await res.json();
    if (!data || !data.riders) throw new Error("데이터 없음");
    lastData = data;
    render(data);
    document.getElementById("ts").textContent = "마지막 업데이트: " + (data.scrapedAt || "-");
  } catch(e) {
    document.getElementById("content").innerHTML =
      `<div class="error-msg">⚠️ 데이터를 불러오지 못했어요.<br><small style="color:#666">${e.message}</small><br><br>관리자가 배민 페이지를 열어두면 자동으로 업데이트됩니다.</div>`;
  }
}

function peakBar(val, goal) {
  if (!goal) return "";
  const pct = Math.min(100, (val/goal)*100);
  const color = pct >= 100 ? "#00e676" : pct >= 70 ? "#ffd740" : "#ff5252";
  return `<div class="peak-bar-wrap"><div class="peak-bar" style="width:${pct.toFixed(0)}%;background:${color}"></div></div>
          <div class="peak-pct">${pct.toFixed(0)}%</div>`;
}

function render(data) {
  const s = data.summary || {};
  const goals = getGoals(currentDayType, currentSets);
  const total = (s.complete||0)+(s.reject||0)+(s.cancel||0);
  const pct = v => total > 0 ? Math.max(1,(v/total)*100).toFixed(1) : 0;
  // 거절율 = (거절+취소) / 수행건수
  const rejectPct = total > 0 ? Math.max(1,((s.reject+s.cancel)/total)*100).toFixed(1) : 0;
  const active = data.activeCount ?? data.riders.filter(r=>r.status?.includes("운행중")).length;
  const totalR = data.totalCount ?? data.riders.length;
  const activeNames = data.riders.filter(r=>r.status?.includes("운행중")).map(r=>r.name);

  if (data.centerName) {
    document.getElementById("centerTitle").textContent = data.centerName;
  }

  const sv = (v,cls,label) =>
    `<div class="stat-item"><div class="stat-val ${v===0?"stat-zero":cls}">${v}</div><div class="stat-label">${label}</div></div>`;

  const cards = data.riders.map(r => {
    const isActive = r.status?.includes("운행중");
    return `<div class="rider-card">
      <div><div class="rider-name">${r.name}</div>
      <span class="rider-status ${isActive?"status-active":"status-inactive"}">${r.status||"-"}</span></div>
      <div class="rider-stats">
        ${sv(r.complete,"stat-complete","완료")}
        ${sv(r.reject,"stat-reject","거절")}
        ${sv(r.cancel,"stat-cancel","배차취소")}
      </div></div>`;
  }).join("");

  const nameTags = activeNames.map(n=>`<span class="active-name-tag">${n}</span>`).join("");
  const dayLabel = {weekday:"평일",friday:"금요일",saturday:"토요일",sunday:"일요일"}[currentDayType];

  // 운행중 상단 정렬
  const sorted = [...data.riders].sort((a,b) => {
    const aA = a.status?.includes("운행중") ? 0 : 1;
    const bA = b.status?.includes("운행중") ? 0 : 1;
    return aA - bA;
  });
  const sortedCards = sorted.map(r => {
    const isActive = r.status?.includes("운행중");
    return `<div class="rider-card">
      <div><div class="rider-name">${r.name}</div>
      <span class="rider-status ${isActive?"status-active":"status-inactive"}">${r.status||"-"}</span></div>
      <div class="rider-stats">
        ${sv(r.complete,"stat-complete","완료")}
        ${sv(r.reject,"stat-reject","거절")}
        ${sv(r.cancel,"stat-cancel","배차취소")}
      </div></div>`;
  }).join("");

  document.getElementById("content").innerHTML = `
    <div class="section-title">⏰ 시간대별 완료 · ${dayLabel} ${currentSets}세트 기준</div>
    <div class="peak-grid">
      <div class="peak-card">
        <div class="peak-emoji">🌅</div><div class="peak-label">아침점심피크</div>
        <div class="peak-value">${s.morningPeak||0}<span class="peak-goal">/ ${goals.morningPeak}</span></div>
        ${peakBar(s.morningPeak||0, goals.morningPeak)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">☀️</div><div class="peak-label">오후논피크</div>
        <div class="peak-value">${s.afternoonOff||0}<span class="peak-goal">/ ${goals.afternoonOff}</span></div>
        ${peakBar(s.afternoonOff||0, goals.afternoonOff)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">🌆</div><div class="peak-label">저녁피크</div>
        <div class="peak-value">${s.eveningPeak||0}<span class="peak-goal">/ ${goals.eveningPeak}</span></div>
        ${peakBar(s.eveningPeak||0, goals.eveningPeak)}
      </div>
      <div class="peak-card">
        <div class="peak-emoji">🌙</div><div class="peak-label">심야논피크</div>
        <div class="peak-value">${s.nightOff||0}<span class="peak-goal">/ ${goals.nightOff}</span></div>
        ${peakBar(s.nightOff||0, goals.nightOff)}
      </div>
    </div>
    <div class="active-banner">
      <div class="active-main">
        <div class="active-dot"></div>
        <div>
          <div class="active-label">현재 운행중</div>
          <div class="active-count">${active}<span style="font-size:14px;color:#555;font-weight:400"> / ${totalR}명</span></div>
        </div>
      </div>
      <div class="active-names">${nameTags||'<span style="color:#444;font-size:11px">운행중 없음</span>'}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card complete"><div class="card-label">✅ 완료</div><div class="card-value">${s.complete||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card reject"><div class="card-label">❌ 거절</div><div class="card-value">${s.reject||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card cancel"><div class="card-label">⚡ 배차취소</div><div class="card-value">${s.cancel||0}<span class="card-unit">건</span></div></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-segment bar-complete" style="width:${pct(s.complete)}%"></div>
      <div class="bar-segment bar-reject"   style="width:${pct(s.reject)}%"></div>
      <div class="bar-segment bar-cancel"   style="width:${pct(s.cancel)}%"></div>
    </div>
    <div class="bar-legend">
      <span><span class="legend-dot" style="background:#00e676"></span>완료 ${pct(s.complete)}%</span>
      <span><span class="legend-dot" style="background:#ff5252"></span>거절율 ${rejectPct}%</span>
    </div>
    <div class="section-title">라이더별 현황</div>
    <div class="rider-list">${sortedCards}</div>`;
}

// 시작
loadData();
scheduleNextLoad();
setInterval(updateNextTime, 30000);
updateNextTime();
</script>
</body>
</html>
