<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>총괄관제 · 일산서구B+A</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f0fafa;--bg2:#ffffff;--bg3:#e8f8f5;
      --border:#00c3aa33;--border2:#00c3aa88;
      --text1:#0a2a28;--text2:#5a8a84;
      --accent:#00c3aa;--acl:#00c3aa18;
      --green:#00796b;--red:#d05050;--yellow:#c09010;
      --header-border:#00c3aa33;
    }
    body.dark{
      --bg:#0f1117;--bg2:#1a1d27;--bg3:#13161f;
      --border:#ffffff15;--border2:#00c3ff55;
      --text1:#f0f0f0;--text2:#666;
      --accent:#00c3ff;--acl:#00c3ff18;
      --green:#00e676;--red:#ff5252;--yellow:#ffd740;
      --header-border:#00c3ff22;
    }
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;padding-bottom:40px;transition:background 0.4s,color 0.4s}

    /* 헤더 */
    header{background:var(--bg2);border-bottom:2px solid var(--header-border);padding:14px 20px;position:sticky;top:0;z-index:10;transition:background 0.4s}
    .header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;gap:8px}
    .logo-text{font-size:15px;font-weight:700;color:var(--text1)}
    .center-sub{font-size:10px;color:var(--text2);margin-top:1px}
    .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .next-info{font-size:11px;color:var(--text2);background:var(--bg3);border-radius:6px;padding:5px 10px;white-space:nowrap}
    .next-info span{color:var(--green);font-weight:700}
    .theme-btn{background:var(--bg2);border:1.5px solid var(--border2);border-radius:8px;color:var(--accent);font-size:16px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s}

    /* 탭 */
    .bc-tab-bar{display:flex;background:var(--bg2);border-bottom:1.5px solid var(--border)}
    .bc-tab{flex:1;padding:13px;font-size:14px;font-weight:700;color:var(--text2);text-align:center;border-bottom:2px solid transparent;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.2s;background:transparent;border-top:none;border-left:none;border-right:none}
    .bc-tab.active{color:var(--accent);border-bottom-color:var(--accent);background:var(--bg)}

    /* 합계바 */
    .bc-total-bar{background:var(--bg2);border-bottom:1px solid var(--border);padding:8px 16px}
    .bc-total-inner{display:flex;align-items:center;gap:14px;flex-wrap:wrap}
    .bc-total-item{text-align:center}
    .bc-total-label{font-size:9px;color:var(--text2);margin-bottom:2px}
    .bc-total-value{font-size:13px;font-weight:900}

    /* 컨트롤바 */
    .control-bar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:10px 20px 0}
    .copy-btn{background:var(--acl);border:1.5px solid var(--accent);border-radius:7px;color:var(--green);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:14px 12px;cursor:pointer;font-weight:700;white-space:nowrap;transition:all 0.3s}
    .copy-btn:hover{background:var(--accent);color:#fff}
    .save-btn{background:var(--bg3);border:1.5px solid var(--border2);border-radius:7px;color:var(--text2);font-size:11px;font-family:'Noto Sans KR',sans-serif;padding:6px 10px;cursor:pointer;font-weight:700;white-space:nowrap;transition:all 0.3s}
    .save-btn:hover{background:var(--acl);color:var(--green);border-color:var(--accent)}
    .divider{width:1px;height:20px;background:var(--border)}
    .sets-wrap{display:flex;align-items:center;gap:5px}
    .sets-label{font-size:11px;color:var(--text2)}
    .sets-input{width:38px;background:var(--bg3);border:1.5px solid var(--border2);border-radius:6px;color:var(--text1);font-size:13px;font-weight:700;font-family:'Noto Sans KR',sans-serif;padding:4px 6px;text-align:center;transition:all 0.4s}
    .arr-btn{background:var(--bg3);border:1px solid var(--border2);border-radius:5px;color:var(--accent);font-size:11px;width:24px;height:24px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.3s}
    .day-btns{display:flex;gap:5px}
    .day-btn{background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text2);font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;padding:4px 12px;cursor:pointer;transition:all 0.2s}
    .day-btn.active{background:var(--acl);border-color:var(--border2);color:var(--green)}

    /* 컨텐츠 */
    .tab-content{display:none}
    .tab-content.active{display:block}

    /* 배너 */
    .active-banner{margin:14px 16px 6px;background:var(--bg2);border:1.5px solid var(--border);border-radius:12px;padding:13px 18px;display:flex;align-items:center;justify-content:space-between;transition:all 0.3s}
    .active-main{display:flex;align-items:center;gap:10px}
    .active-dot{width:9px;height:9px;background:var(--green);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.5)}}
    .active-label{font-size:12px;color:var(--text2)}
    .active-count{font-size:26px;font-weight:900;color:var(--green);line-height:1}
    .active-names{font-size:10px;color:var(--text2);max-width:55%;line-height:1.7;text-align:right}
    .active-name-tag{display:inline-block;background:var(--acl);color:var(--green);border:1px solid var(--border);border-radius:4px;padding:1px 6px;margin:1px 2px;font-size:10px}

    /* 요약카드 */
    .summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:8px 16px}
    .summary-card{background:var(--bg2);border-radius:12px;padding:14px 10px;text-align:center;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:all 0.4s}
    .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
    .summary-card.complete::before{background:var(--green)}
    .summary-card.reject::before{background:var(--red)}
    .summary-card.cancel::before{background:var(--yellow)}
    .card-label{font-size:11px;color:var(--text2);margin-bottom:8px}
    .card-value{font-size:26px;font-weight:900;line-height:1}
    .summary-card.complete .card-value{color:var(--green)}
    .summary-card.reject .card-value{color:var(--red)}
    .summary-card.cancel .card-value{color:var(--yellow)}
    .card-unit{font-size:12px;font-weight:500}
    .bar-wrap{display:flex;gap:4px;padding:2px 16px 8px;height:12px}
    .bar-segment{height:8px;border-radius:4px;min-width:2px}
    .bar-complete{background:var(--green)}.bar-reject{background:var(--red)}.bar-cancel{background:var(--yellow)}
    .bar-legend{display:flex;gap:14px;padding:0 16px 12px;font-size:11px;color:var(--text2)}
    .legend-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px;vertical-align:middle}

    /* 피크 */
    .section-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;padding:4px 16px 8px}
    .peak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:0 16px 14px}
    .peak-card{background:var(--bg3);border-radius:12px;padding:14px 8px 10px;text-align:center;border:1.5px solid var(--border);position:relative;overflow:hidden;transition:all 0.4s}
    .peak-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent)}
    .peak-card.current-peak{border-color:var(--accent);box-shadow:0 0 0 2px var(--acl)}
    .peak-card.current-peak::before{height:3px}
    .peak-now-badge{display:none;font-size:8px;font-weight:700;background:var(--accent);color:#fff;border-radius:4px;padding:1px 5px;margin-bottom:3px;animation:badgePulse 1.5s ease-in-out infinite}
    .peak-card.current-peak .peak-now-badge{display:inline-block}
    @keyframes badgePulse{0%,100%{opacity:1}50%{opacity:0.5}}
    .peak-emoji{font-size:18px;margin-bottom:3px}
    .peak-label{font-size:9px;color:var(--text2);margin-bottom:5px}
    .peak-value{font-size:22px;font-weight:900;color:var(--accent);line-height:1}
    .peak-goal{font-size:12px;color:var(--text2);font-weight:400;margin-left:1px}
    .peak-bar-wrap{height:5px;background:var(--border);border-radius:3px;margin:8px 4px 0;overflow:hidden}
    .peak-bar{height:100%;border-radius:3px;transition:width 0.6s ease}
    .peak-pct{font-size:9px;color:var(--text2);margin-top:4px}

    /* 라이더 섹션 */
    .rider-section-header{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 8px;cursor:pointer;user-select:none}
    .rider-section-header:hover .rider-section-title{color:var(--accent)}
    .rider-section-title{font-size:11px;color:var(--text2);font-weight:700;letter-spacing:0.07em;text-transform:uppercase;transition:color 0.2s}
    .rider-section-right{display:flex;align-items:center;gap:10px}
    .rider-toggle-icon{font-size:12px;color:var(--text2);transition:transform 0.3s}
    .rider-toggle-icon.open{transform:rotate(180deg)}
    .rider-tab-bar{display:flex;background:var(--bg3);border-radius:8px;padding:3px;gap:3px}
    .rider-tab-btn{padding:4px 12px;border:none;border-radius:6px;font-size:11px;font-weight:600;font-family:'Noto Sans KR',sans-serif;cursor:pointer;background:transparent;color:var(--text2);transition:all 0.2s}
    .rider-tab-btn.active{background:var(--bg2);color:var(--accent)}
    .rider-list{padding:0 16px;overflow:hidden;transition:max-height 0.4s ease;max-height:0}
    .rider-list.open{max-height:3000px}
    .rider-card{background:var(--bg2);border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1.5px solid var(--border);transition:all 0.3s;cursor:pointer}
    .rider-card:hover{border-color:var(--border2)}
    .rider-card-top{display:flex;align-items:center;justify-content:space-between}
    .rider-name{font-size:14px;font-weight:700;color:var(--text1);margin-bottom:3px}
    .rider-status{font-size:10px;padding:2px 7px;border-radius:4px;font-weight:700;display:inline-block}
    .status-active{background:var(--acl);color:var(--green);border:1px solid var(--border2)}
    .status-inactive{background:#ff525222;color:var(--red)}
    .rider-stats{display:flex;gap:14px;text-align:center}
    .stat-item{min-width:34px}
    .stat-val{font-size:17px;font-weight:900;line-height:1}
    .stat-label{font-size:9px;color:var(--text2);margin-top:2px}
    .stat-complete{color:var(--green)}.stat-reject{color:var(--red)}.stat-cancel{color:var(--yellow)}.stat-zero{color:#555}
    .rider-peak-detail{overflow:hidden;max-height:0;transition:max-height 0.3s ease}
    .rider-peak-detail.open{max-height:200px}
    .rider-peak-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding-top:12px;margin-top:10px;border-top:1px solid var(--border)}
    .rider-peak-item{text-align:center;background:var(--bg3);border-radius:8px;padding:8px 4px}
    .rider-peak-emoji{font-size:14px;margin-bottom:3px}
    .rider-peak-label{font-size:8px;color:var(--text2);margin-bottom:3px}
    .rider-peak-val{font-size:16px;font-weight:900;color:var(--accent)}
    .week-rr-card{background:var(--bg2);border-radius:12px;padding:12px 16px;margin-bottom:8px;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:space-between}
    .week-rr-name{font-size:14px;font-weight:700;color:var(--text1)}
    .week-rr-right{text-align:right}
    .week-rr-val{font-size:22px;font-weight:900;line-height:1}
    .week-rr-label{font-size:9px;color:var(--text2);margin-top:2px}
    .week-rr-sub{font-size:10px;color:var(--text2);margin-top:2px}
    .week-loading{text-align:center;padding:20px;color:var(--text2);font-size:12px}

    .timestamp{font-size:11px;color:var(--text2);text-align:center;padding:8px 0 4px}
    .loading{text-align:center;padding:40px 20px;color:var(--text2)}
    .spinner{font-size:32px;animation:spin 1.2s linear infinite;display:inline-block;margin-bottom:10px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{text-align:center;padding:40px 20px;color:var(--red);font-size:13px;line-height:1.8}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1.5px solid var(--accent);border-radius:12px;padding:12px 20px;font-size:13px;font-weight:600;color:var(--text1);z-index:999;transition:transform 0.4s ease;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>
<div class="toast" id="toast"></div>

<header>
  <div class="header-top">
    <div>
      <div class="logo-text" id="pageTitle">총괄관제 · 일산서구</div>
      <div class="center-sub">배민커넥트비즈</div>
    </div>
    <div class="header-right">
      <div class="next-info">다음 갱신 <span id="nextTime">--:--</span></div>
      <div class="theme-btn" id="themeBtn">🌙</div>
    </div>
  </div>
</header>

<!-- BC 탭 -->
<div class="bc-tab-bar">
  <button class="bc-tab active" id="tabB" data-center="lime_penguin">📊 일산서구B</button>
  <button class="bc-tab" id="tabC" data-center="cherry_rabbit">📊 일산서구A</button>
</div>

<!-- 합계바 -->
<div class="bc-total-bar">
  <div class="bc-total-inner">
    <div class="bc-total-item"><div class="bc-total-label">합계 완료</div><div class="bc-total-value" style="color:var(--green)" id="bcComplete">-</div></div>
    <div style="width:1px;height:24px;background:var(--border)"></div>
    <div class="bc-total-item"><div class="bc-total-label">합계 거절</div><div class="bc-total-value" style="color:var(--red)" id="bcReject">-</div></div>
    <div style="width:1px;height:24px;background:var(--border)"></div>
    <div class="bc-total-item"><div class="bc-total-label">합계 운행중</div><div class="bc-total-value" style="color:var(--accent)" id="bcActive">-</div></div>
    <div style="width:1px;height:24px;background:var(--border)"></div>
    <div class="bc-total-item"><div class="bc-total-label">합계 기사</div><div class="bc-total-value" id="bcRiders">-</div></div>
  </div>
</div>

<!-- 컨트롤바 (탭별 독립) -->
<div class="control-bar">
  <button class="copy-btn" id="copyBtn">📋 현황 복사</button>
  <div style="margin-left:auto;display:flex;align-items:center;gap:8px">
    <div class="sets-wrap">
      <span class="sets-label">세트수</span>
      <div class="arr-btn" id="setsDown">▼</div>
      <input type="number" class="sets-input" id="setsInput" value="5" min="1" max="10"/>
      <div class="arr-btn" id="setsUp">▲</div>
      <span class="sets-label">세트</span>
    </div>
    <div class="divider"></div>
    <div class="day-btns" id="dayBtns">
      <button class="day-btn" data-day="weekday">평일</button>
      <button class="day-btn" data-day="friday">금</button>
      <button class="day-btn" data-day="saturday">토</button>
      <button class="day-btn" data-day="sunday">일</button>
    </div>
    <div class="divider"></div>
    <button class="save-btn" id="saveBtn">💾 저장</button>
  </div>
</div>

<!-- B 탭 컨텐츠 -->
<div class="tab-content active" id="contentB">
  <div class="loading"><div class="spinner">⏳</div><br>데이터 불러오는 중...</div>
</div>
<!-- C 탭 컨텐츠 -->
<div class="tab-content" id="contentC">
  <div class="loading"><div class="spinner">⏳</div><br>데이터 불러오는 중...</div>
</div>

<script>
const FIREBASE_BASE = "https://baemin-dashboard-b289e-default-rtdb.firebaseio.com";

const CENTERS = {
  lime_penguin:  { name:"일산서구B", contentId:"contentB", tabId:"tabB" },
  cherry_rabbit: { name:"일산서구A", contentId:"contentC", tabId:"tabC" },
};

const GOALS_PER_SET = {
  weekday: { morningPeak:21, afternoonOff:20, eveningPeak:30, nightOff:29 },
  friday:  { morningPeak:24, afternoonOff:21, eveningPeak:32, nightOff:33 },
  saturday:{ morningPeak:31, afternoonOff:22, eveningPeak:36, nightOff:31 },
  sunday:  { morningPeak:33, afternoonOff:22, eveningPeak:35, nightOff:30 },
};

// 센터별 독립 상태
let activeCenter  = "lime_penguin";
let dataCache     = { lime_penguin: null, cherry_rabbit: null };
let riderListOpen = { lime_penguin: false, cherry_rabbit: false };
let riderTab      = { lime_penguin: "today", cherry_rabbit: "today" };
let weeklyCache   = { lime_penguin: null, cherry_rabbit: null };
let openRiderCards = new Set();
let manualTheme   = null;

// ── 센터별 설정 ──
function getSettings(centerId) {
  try {
    const s = JSON.parse(localStorage.getItem(`dashSettings_${centerId}`) || "{}");
    return { sets: s.sets || 5, dayType: s.dayType || getTodayDayType() };
  } catch(e) { return { sets:5, dayType:getTodayDayType() }; }
}
function saveSettings(centerId, sets, dayType) {
  localStorage.setItem(`dashSettings_${centerId}`, JSON.stringify({ sets, dayType }));
  showToast("💾 설정 저장 완료!");
}

// ── 컨트롤바 동기화 (탭 전환 시 해당 센터 설정 반영) ──
function syncControls(centerId) {
  const cfg = getSettings(centerId);
  document.getElementById("setsInput").value = cfg.sets;
  document.querySelectorAll(".day-btn").forEach(b =>
    b.classList.toggle("active", b.dataset.day === cfg.dayType)
  );
}

// ── 테마 ──
function applyTheme(dark) {
  document.body.classList.toggle("dark", dark);
  document.getElementById("themeBtn").textContent = dark ? "☀️" : "🌙";
}
function autoTheme() {
  if (manualTheme !== null) { applyTheme(manualTheme); return; }
  const mins = new Date().getHours()*60 + new Date().getMinutes();
  applyTheme(mins < 7*60+30 || mins >= 19*60+30);
}
document.getElementById("themeBtn").addEventListener("click", () => {
  manualTheme = !document.body.classList.contains("dark");
  applyTheme(manualTheme);
});
autoTheme();
setInterval(autoTheme, 60000);

// ── 유틸 ──
function getTodayDayType() {
  const d = new Date().getDay();
  return d===0?"sunday":d===6?"saturday":d===5?"friday":"weekday";
}
function getGoals(sets, dayType) {
  const base = GOALS_PER_SET[dayType||getTodayDayType()];
  return { morningPeak:base.morningPeak*sets, afternoonOff:base.afternoonOff*sets,
           eveningPeak:base.eveningPeak*sets, nightOff:base.nightOff*sets };
}
function getCurrentPeak() {
  const h = new Date().getHours();
  if (h>=6  && h<14) return "morningPeak";
  if (h>=14 && h<17) return "afternoonOff";
  if (h>=17 && h<21) return "eveningPeak";
  return "nightOff";
}
const rrColor = r => r>=20?"var(--red)":r>=10?"#f5c842":"var(--green)";
let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2500);
}

// ── 탭 전환 ──
document.querySelectorAll(".bc-tab").forEach(tab => {
  tab.addEventListener("click", () => {
    activeCenter = tab.dataset.center;
    document.querySelectorAll(".bc-tab").forEach(t => t.classList.toggle("active", t===tab));
    Object.entries(CENTERS).forEach(([id, c]) => {
      document.getElementById(c.contentId).classList.toggle("active", id===activeCenter);
    });
    syncControls(activeCenter);
  });
});

// ── 컨트롤바 이벤트 ──
document.getElementById("setsDown").addEventListener("click", () => {
  const inp = document.getElementById("setsInput");
  inp.value = Math.max(1, parseInt(inp.value)-1);
  if (dataCache[activeCenter]) renderCenter(activeCenter, dataCache[activeCenter]);
});
document.getElementById("setsUp").addEventListener("click", () => {
  const inp = document.getElementById("setsInput");
  inp.value = Math.min(10, parseInt(inp.value)+1);
  if (dataCache[activeCenter]) renderCenter(activeCenter, dataCache[activeCenter]);
});
document.getElementById("setsInput").addEventListener("change", e => {
  e.target.value = Math.min(10, Math.max(1, parseInt(e.target.value)||1));
  if (dataCache[activeCenter]) renderCenter(activeCenter, dataCache[activeCenter]);
});
document.querySelectorAll(".day-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".day-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    if (dataCache[activeCenter]) renderCenter(activeCenter, dataCache[activeCenter]);
  });
});
document.getElementById("saveBtn").addEventListener("click", () => {
  const sets    = parseInt(document.getElementById("setsInput").value)||5;
  const dayType = document.querySelector(".day-btn.active")?.dataset.day || getTodayDayType();
  saveSettings(activeCenter, sets, dayType);
});
document.getElementById("copyBtn").addEventListener("click", copyStatus);

// ── 자동 갱신 ──
const SLOT_MIN = 5;
function getNextSlot() {
  const now = new Date();
  const ms  = now.getMinutes()*60000+now.getSeconds()*1000+now.getMilliseconds();
  return new Date(Date.now()+(SLOT_MIN*60000-(ms%(SLOT_MIN*60000))));
}
function updateNextTime() {
  document.getElementById("nextTime").textContent =
    getNextSlot().toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
}
function scheduleNextLoad() {
  setTimeout(()=>{ loadAll(); scheduleNextLoad(); }, getNextSlot()-Date.now());
}

// ── 데이터 로드 ──
async function loadAll() {
  await Promise.all(Object.keys(CENTERS).map(id => loadCenter(id)));
  updateTotals();
}

async function loadCenter(centerId) {
  const url = `${FIREBASE_BASE}/baeminData/${centerId}.json`;
  try {
    const res  = await fetch(url);
    if (!res.ok) throw new Error("응답 오류 "+res.status);
    const data = await res.json();
    if (!data||!data.riders) throw new Error("데이터 없음");
    dataCache[centerId] = data;
    weeklyCache[centerId] = null; // 캐시 초기화
    renderCenter(centerId, data);
  } catch(e) {
    document.getElementById(CENTERS[centerId].contentId).innerHTML =
      `<div class="error-msg">⚠️ 데이터를 불러오지 못했어요.<br><small>${e.message}</small></div>`;
  }
}

// ── 피크바 ──
function peakBar(val, goal) {
  if (!goal) return "";
  const pct   = Math.min(100,(val/goal)*100);
  const color = pct>=100?"var(--green)":pct>=70?"#f5c842":"var(--red)";
  return `<div class="peak-bar-wrap"><div class="peak-bar" style="width:${pct.toFixed(0)}%;background:${color}"></div></div>
          <div class="peak-pct">${pct.toFixed(0)}%</div>`;
}

// ── 센터별 렌더 ──
function renderCenter(centerId, data) {
  const cfg     = centerId===activeCenter
    ? { sets: parseInt(document.getElementById("setsInput").value)||5,
        dayType: document.querySelector(".day-btn.active")?.dataset.day||getTodayDayType() }
    : getSettings(centerId);
  const goals   = getGoals(cfg.sets, cfg.dayType);
  const s       = data.summary||{};
  const total   = (s.complete||0)+(s.reject||0)+(s.cancel||0);
  const pct     = v => total>0?Math.max(1,(v/total)*100).toFixed(1):0;
  const rjPct   = total>0?Math.max(1,((s.reject+s.cancel)/total)*100).toFixed(1):0;
  const active  = data.activeCount??data.riders.filter(r=>r.statusCode==="DELIVERING"||r.status?.includes("운행중")).length;
  const totalR  = data.totalCount??data.riders.length;
  const activeNames = data.riders.filter(r=>r.statusCode==="DELIVERING"||r.status?.includes("운행중")).map(r=>r.name);
  const dayLabel = {weekday:"평일",friday:"금요일",saturday:"토요일",sunday:"일요일"}[cfg.dayType];
  const curPeak = getCurrentPeak();

  // 페이지 타이틀 업데이트 (DP코드 숨김)
  if (data.centerName && centerId===activeCenter) {
    document.getElementById("pageTitle").textContent =
      data.centerName.replace(/\s*\(DP\d+\)/i,"");
    document.title = data.centerName.replace(/\s*\(DP\d+\)/i,"") + " 총괄관제";
  }

  const nameTags = activeNames.map(n=>`<span class="active-name-tag">${n}</span>`).join("");
  const peakCards = [
    {key:"morningPeak", emoji:"🌅",label:"아침점심피크", val:s.morningPeak||0, goal:goals.morningPeak},
    {key:"afternoonOff",emoji:"☀️",label:"오후논피크",   val:s.afternoonOff||0,goal:goals.afternoonOff},
    {key:"eveningPeak", emoji:"🌆",label:"저녁피크",     val:s.eveningPeak||0, goal:goals.eveningPeak},
    {key:"nightOff",    emoji:"🌙",label:"심야논피크",   val:s.nightOff||0,    goal:goals.nightOff},
  ].map(p=>`
    <div class="peak-card ${p.key===curPeak?"current-peak":""}" data-peak-key="${p.key}">
      <div class="peak-now-badge">NOW</div>
      <div class="peak-emoji">${p.emoji}</div>
      <div class="peak-label">${p.label}</div>
      <div class="peak-value">${p.val}<span class="peak-goal">/ ${p.goal}</span></div>
      ${peakBar(p.val,p.goal)}
    </div>`).join("");

  const sv = (v,cls,label)=>
    `<div class="stat-item"><div class="stat-val ${v===0?"stat-zero":cls}">${v}</div><div class="stat-label">${label}</div></div>`;
  const svRate = rate=>
    `<div class="stat-item"><div class="stat-val" style="color:${rrColor(rate)}">${rate}%</div><div class="stat-label">거절율</div></div>`;
  const calcRR = r=>{const t=(r.complete||0)+(r.reject||0)+(r.cancel||0);return t>0?Math.round(((r.reject+r.cancel)/t)*1000)/10:0;};

  const sorted = [...data.riders].sort((a,b)=>(a.status?.includes("운행중")?0:1)-(b.status?.includes("운행중")?0:1));
  const riderCards = sorted.map(r=>{
    const isActive = r.statusCode==="DELIVERING"||r.status?.includes("운행중");
    const rr = calcRR(r);
    const sid = `${centerId}_${r.name.replace(/\s/g,"_")}`;
    const isOpen = openRiderCards.has(sid);
    return `<div class="rider-card" data-sid="${sid}">
      <div class="rider-card-top">
        <div><div class="rider-name">${r.name}</div>
        <span class="rider-status ${isActive?"status-active":"status-inactive"}">${r.status||"-"}</span></div>
        <div class="rider-stats">
          ${sv(r.complete,"stat-complete","완료")}
          ${sv(r.reject,"stat-reject","거절")}
          ${sv(r.cancel,"stat-cancel","배차취소")}
          ${svRate(rr)}
        </div>
      </div>
      <div class="rider-peak-detail ${isOpen?"open":""}" id="rpd_${sid}">
        <div class="rider-peak-grid">
          <div class="rider-peak-item"><div class="rider-peak-emoji">🌅</div><div class="rider-peak-label">아침점심</div><div class="rider-peak-val">${r.morningPeak||0}</div></div>
          <div class="rider-peak-item"><div class="rider-peak-emoji">☀️</div><div class="rider-peak-label">오후논피크</div><div class="rider-peak-val">${r.afternoonOff||0}</div></div>
          <div class="rider-peak-item"><div class="rider-peak-emoji">🌆</div><div class="rider-peak-label">저녁피크</div><div class="rider-peak-val">${r.eveningPeak||0}</div></div>
          <div class="rider-peak-item"><div class="rider-peak-emoji">🌙</div><div class="rider-peak-label">심야논피크</div><div class="rider-peak-val">${r.nightOff||0}</div></div>
        </div>
      </div>
    </div>`;
  }).join("");

  const isListOpen = riderListOpen[centerId];
  const curRiderTab = riderTab[centerId];

  const contentEl = document.getElementById(CENTERS[centerId].contentId);
  contentEl.innerHTML = `
    <div class="section-title">⏰ 시간대별 완료 · ${dayLabel} ${cfg.sets}세트 기준</div>
    <div class="peak-grid">${peakCards}</div>
    <div class="active-banner">
      <div class="active-main">
        <div class="active-dot"></div>
        <div>
          <div class="active-label">현재 운행중</div>
          <div class="active-count">${active}<span style="font-size:14px;color:var(--text2);font-weight:400"> / ${totalR}명</span></div>
        </div>
      </div>
      <div class="active-names">${nameTags||'<span style="color:var(--text2);font-size:11px">운행중 없음</span>'}</div>
    </div>
    <div class="summary-grid">
      <div class="summary-card complete"><div class="card-label">✅ 완료</div><div class="card-value">${s.complete||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card reject"><div class="card-label">❌ 거절</div><div class="card-value">${s.reject||0}<span class="card-unit">건</span></div></div>
      <div class="summary-card cancel"><div class="card-label">⚡ 배차취소</div><div class="card-value">${s.cancel||0}<span class="card-unit">건</span></div></div>
    </div>
    <div class="bar-wrap">
      <div class="bar-segment bar-complete" style="width:${pct(s.complete)}%"></div>
      <div class="bar-segment bar-reject"   style="width:${pct(s.reject)}%"></div>
      <div class="bar-segment bar-cancel"   style="width:${pct(s.cancel)}%"></div>
    </div>
    <div class="bar-legend">
      <span><span class="legend-dot" style="background:var(--green)"></span>완료 ${pct(s.complete)}%</span>
      <span><span class="legend-dot" style="background:var(--red)"></span>거절율 ${rjPct}%</span>
    </div>
    <div class="rider-section-header" data-center="${centerId}">
      <span class="rider-section-title">👥 라이더별 현황 (${totalR}명)</span>
      <div class="rider-section-right">
        <div class="rider-tab-bar">
          <button class="rider-tab-btn ${curRiderTab==="today"?"active":""}" data-center="${centerId}" data-tab="today">오늘</button>
          <button class="rider-tab-btn ${curRiderTab==="weekly"?"active":""}" data-center="${centerId}" data-tab="weekly">주간</button>
        </div>
        <span class="rider-toggle-icon ${isListOpen?"open":""}">▼</span>
      </div>
    </div>
    <div class="rider-list ${isListOpen?"open":""}" id="rlist_${centerId}"></div>
    <div class="timestamp">마지막 업데이트: ${data.scrapedAt||"-"}</div>`;

  // 라이더 목록 렌더
  document.getElementById(`rlist_${centerId}`).innerHTML =
    curRiderTab==="today" ? riderCards : '<div class="week-loading">⏳ 로딩중...</div>';
  if (curRiderTab==="weekly") renderWeeklyRR(centerId);

  // 이벤트 바인딩
  contentEl.querySelector(`.rider-section-header[data-center="${centerId}"]`)
    .addEventListener("click", () => toggleRiderList(centerId));

  contentEl.querySelectorAll(`.rider-tab-btn[data-center="${centerId}"]`).forEach(btn => {
    btn.addEventListener("click", e => {
      e.stopPropagation();
      riderTab[centerId] = btn.dataset.tab;
      contentEl.querySelectorAll(`.rider-tab-btn[data-center="${centerId}"]`)
        .forEach(b => b.classList.toggle("active", b===btn));
      const listEl = document.getElementById(`rlist_${centerId}`);
      if (btn.dataset.tab==="today") listEl.innerHTML = riderCards;
      else { listEl.innerHTML='<div class="week-loading">⏳ 로딩중...</div>'; renderWeeklyRR(centerId); }
    });
  });

  contentEl.querySelectorAll(".rider-card[data-sid]").forEach(card => {
    card.addEventListener("click", () => {
      const sid = card.dataset.sid;
      const det = document.getElementById("rpd_"+sid);
      if (!det) return;
      if (openRiderCards.has(sid)) openRiderCards.delete(sid);
      else openRiderCards.add(sid);
      det.classList.toggle("open", openRiderCards.has(sid));
    });
  });
}

function toggleRiderList(centerId) {
  riderListOpen[centerId] = !riderListOpen[centerId];
  const listEl = document.getElementById(`rlist_${centerId}`);
  const icon   = document.querySelector(`.rider-section-header[data-center="${centerId}"] .rider-toggle-icon`);
  listEl?.classList.toggle("open", riderListOpen[centerId]);
  icon?.classList.toggle("open", riderListOpen[centerId]);
}

async function renderWeeklyRR(centerId) {
  const listEl = document.getElementById(`rlist_${centerId}`);
  if (!listEl) return;
  if (!weeklyCache[centerId]) {
    const dates=[];
    for(let i=1;i<=7;i++){const d=new Date();d.setDate(d.getDate()-i);dates.push(d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"));}
    const results=await Promise.all(dates.map(date=>fetch(`${FIREBASE_BASE}/riderHistory/${centerId}/${date}.json`).then(r=>r.json()).catch(()=>null)));
    const rt={};
    results.forEach(day=>{if(!day||!day.riders)return;Object.values(day.riders).forEach(r=>{if(!r.name)return;if(!rt[r.name])rt[r.name]={name:r.name,reject:0,cancel:0,total:0};rt[r.name].reject+=r.reject||0;rt[r.name].cancel+=r.cancel||0;rt[r.name].total+=r.total||((r.complete||0)+(r.reject||0)+(r.cancel||0));});});
    weeklyCache[centerId]=Object.values(rt).map(r=>({name:r.name,rejectRate:r.total>0?Math.round(((r.reject+r.cancel)/r.total)*1000)/10:0,total:r.total,reject:r.reject+r.cancel})).sort((a,b)=>b.rejectRate-a.rejectRate);
  }
  if (!weeklyCache[centerId]?.length){listEl.innerHTML='<div class="week-loading">📭 주간 데이터가 없어요.</div>';return;}
  listEl.innerHTML=weeklyCache[centerId].map(r=>`
    <div class="week-rr-card">
      <div class="week-rr-name">${r.name}</div>
      <div class="week-rr-right">
        <div class="week-rr-val" style="color:${rrColor(r.rejectRate)}">${r.rejectRate}%</div>
        <div class="week-rr-label">주간 거절율</div>
        <div class="week-rr-sub">거절 ${r.reject}건 · 수행 ${r.total}건</div>
      </div>
    </div>`).join("");
}

// ── 합계 업데이트 ──
function updateTotals() {
  let tC=0,tR=0,tA=0,tRiders=0;
  Object.values(dataCache).forEach(data=>{
    if(!data)return;
    const s=data.summary||{};
    tC+=s.complete||0;
    tR+=(s.reject||0)+(s.cancel||0);
    tA+=data.activeCount??0;
    tRiders+=data.totalCount??data.riders?.length??0;
  });
  document.getElementById("bcComplete").textContent=tC+"건";
  document.getElementById("bcReject").textContent=tR+"건";
  document.getElementById("bcActive").textContent=tA+"명";
  document.getElementById("bcRiders").textContent=tRiders+"명";
}

// ── 현황 복사 (현재 탭 기준) ──
function copyStatus() {
  const data = dataCache[activeCenter];
  if (!data) { alert("데이터가 없어요!"); return; }
  const cfg = { sets: parseInt(document.getElementById("setsInput").value)||5,
                dayType: document.querySelector(".day-btn.active")?.dataset.day||getTodayDayType() };
  const goals = getGoals(cfg.sets, cfg.dayType);
  const s = data.summary||{};
  const now = new Date(); const hour = now.getHours();
  let peakLabel="",peakDone=0,peakGoal=0;
  if(hour>=6&&hour<14){peakLabel="아침점심";peakDone=s.morningPeak||0;peakGoal=goals.morningPeak;}
  else if(hour>=14&&hour<17){peakLabel="오후논피크";peakDone=s.afternoonOff||0;peakGoal=goals.afternoonOff;}
  else if(hour>=17&&hour<21){peakLabel="저녁피크";peakDone=s.eveningPeak||0;peakGoal=goals.eveningPeak;}
  else{peakLabel="심야논피크";peakDone=s.nightOff||0;peakGoal=goals.nightOff;}
  const remain=Math.max(0,peakGoal-peakDone);
  const active=data.activeCount??0;
  const timeStr=now.toLocaleTimeString("ko-KR",{hour:"2-digit",minute:"2-digit"});
  const p=peakGoal>0?((peakDone/peakGoal)*100).toFixed(0):0;
  // 지사명: DP코드 숨김
  const centerName=(data.centerName||CENTERS[activeCenter]?.name||"").replace(/\s*\(DP\d+\)/i,"");
  const text=`${timeStr} ${peakLabel}\n운행중 ${active}명\n진행 : ${peakDone}/${peakGoal} (${p}%)\n잔여할당 : ${remain}건`;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById("copyBtn");
    if(btn){btn.textContent="✅ 복사됨!";setTimeout(()=>btn.textContent="📋 현황 복사",2000);}
  });
}

// ── 시작 ──
window.addEventListener("load", () => {
  // 초기 설정 로드 (B센터 기준)
  syncControls("lime_penguin");
  loadAll();
  scheduleNextLoad();
  setInterval(updateNextTime, 30000);
  updateNextTime();
});
</script>
</body>
